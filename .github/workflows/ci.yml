name: CI

# Runs the Pester test suite on every push (commit) to the repository. Release stays a
# separate, manual-only workflow; this one only tests.
#
# The automated version-bump commit carries [skip ci], so GitHub skips this run for it.
on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          $result = Invoke-Pester -Path ./Tests -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) test(s) failed."
          }
