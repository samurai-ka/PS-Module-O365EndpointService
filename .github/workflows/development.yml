name: Development

# Runs on every push: first the Pester tests, then - only on master and only when the tests
# passed - the module version PATCH is bumped. Versions follow SemVer (https://semver.org):
# Major.Minor.Patch. Bump major/minor manually in the manifest; this workflow only advances
# the patch.
#
# The automated bump commit is pushed with the default GITHUB_TOKEN (which does not retrigger
# workflows) and carries a [skip ci] marker, so this workflow never triggers itself.
on:
  push:

permissions:
  contents: read

# serialize runs per ref so concurrent pushes don't race on the manifest during the bump
concurrency:
  group: development-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          $result = Invoke-Pester -Path ./Tests -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) test(s) failed."
          }

  bump:
    name: Bump module version
    needs: test                     # only runs if the tests succeeded
    # only on master, skip branch deletions and our own automated bump commits
    if: ${{ github.ref == 'refs/heads/master' && github.event.deleted != true && !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write               # needed to push the bump commit
    steps:
      - uses: actions/checkout@v4

      - name: Increment ModuleVersion patch
        shell: pwsh
        run: |
          $manifest = 'O365EndpointFunctions/O365EndpointFunctions.psd1'
          $raw = Get-Content -LiteralPath $manifest -Raw

          if ($raw -notmatch "ModuleVersion\s*=\s*'([^']+)'") {
              throw "ModuleVersion not found in $manifest"
          }
          $current = $Matches[1]

          # SemVer Major.Minor.Patch (https://semver.org). This workflow only bumps the patch;
          # bump major/minor manually in the manifest.
          $parts = $current.Split('.')
          if ($parts.Count -ne 3) {
              throw "ModuleVersion '$current' is not in the expected SemVer Major.Minor.Patch format"
          }

          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          $newVersion = '{0}.{1}.{2}' -f $major, $minor, ($patch + 1)
          Write-Host "ModuleVersion: $current -> $newVersion"

          $updated = $raw -replace "ModuleVersion\s*=\s*'[^']+'", "ModuleVersion = '$newVersion'"

          # preserve the manifest's UTF-16 LE + BOM encoding
          [System.IO.File]::WriteAllText((Resolve-Path $manifest), $updated, [System.Text.UnicodeEncoding]::new($false, $true))

          "NEW_VERSION=$newVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Commit and push
        shell: bash
        run: |
          if git diff --quiet -- O365EndpointFunctions/O365EndpointFunctions.psd1; then
            echo "No version change to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add O365EndpointFunctions/O365EndpointFunctions.psd1
          git commit -m "Bump module version to ${NEW_VERSION} [skip ci]"
          git push
