name: Development

# Runs the Pester tests on every pull request targeting master (including PRs from forks).
# It does NOT run on pushes to master: because master is protected and only accepts changes
# through pull requests, the code has already been tested by the time it lands - re-running on
# the merge push would be redundant. This workflow only validates; it never writes to master.
#
# Versioning follows SemVer (https://semver.org): Major.Minor.Patch. The version is the
# ModuleVersion in the manifest and is updated through normal pull requests. Publishing to the
# PowerShell Gallery and tagging the release is the separate, manual-only release.yml workflow.
on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: development-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          $result = Invoke-Pester -Path ./Tests -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) test(s) failed."
          }
