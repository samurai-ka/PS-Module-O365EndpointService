name: Release module

# Publishes the O365EndpointFunctions module to the PowerShell Gallery through the
# "production" environment. The publish job is gated by that environment's protection
# rules (e.g. required reviewers) and reads its PSGALLERY_API_KEY secret.
#
# Release is manual only: it must be started explicitly from the Actions tab
# (Run workflow). There is intentionally no automatic trigger.
#
# Tests are NOT run here - they run in development.yml on every push. This workflow refuses
# to publish unless the latest development.yml run on the selected branch concluded successfully.
#
# The version is the ModuleVersion in the manifest (updated via normal pull requests). After a
# successful publish this workflow tags the release as v<version> (a tag push, which does not
# touch the protected master branch).
on:
  workflow_dispatch:

permissions:
  contents: write   # needed to push the release tag
  actions: read

jobs:
  publish:
    name: Publish to PowerShell Gallery
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.powershellgallery.com/packages/O365EndpointFunctions
    steps:
      - uses: actions/checkout@v4

      - name: Require a successful CI run on this branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          branch="${{ github.ref_name }}"
          conclusion=$(gh run list --workflow development.yml --branch "$branch" --limit 20 \
            --json conclusion,status \
            --jq '[.[] | select(.status=="completed")][0].conclusion')
          echo "Latest completed CI run on '$branch': ${conclusion:-<none>}"
          if [ "$conclusion" != "success" ]; then
            echo "::error::CI (development.yml) has not succeeded on '$branch' (conclusion: ${conclusion:-none}). Aborting release."
            exit 1
          fi

      - name: Publish module
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
              throw "The PSGALLERY_API_KEY secret is not set on the 'production' environment."
          }

          # The module lives in a folder named after the module, so publish it directly.
          Test-ModuleManifest -Path ./O365EndpointFunctions/O365EndpointFunctions.psd1 | Out-Null
          Publish-Module -Path ./O365EndpointFunctions -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

      - name: Tag the release
        shell: pwsh
        run: |
          $version = (Test-ModuleManifest -Path ./O365EndpointFunctions/O365EndpointFunctions.psd1).Version.ToString()
          $tag = "v$version"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if (git ls-remote --tags origin "refs/tags/$tag") {
              Write-Host "Tag $tag already exists - skipping."
          }
          else {
              git tag -a $tag -m "Release $version"
              git push origin $tag
              Write-Host "Tagged release $tag."
          }
